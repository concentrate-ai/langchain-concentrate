name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Cancel in-progress runs for the same ref when a new commit lands.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # Resolve against published PyPI packages, not the monorepo's local
  # `[tool.uv.sources]` editable paths (which don't exist in a clean clone).
  UV_NO_SOURCES: "1"

jobs:
  lint:
    name: Lint & type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Set up Python
        run: uv python install 3.11
      - name: Ruff check
        run: uv run --no-sources --group lint ruff check .
      - name: Ruff format check
        run: uv run --no-sources --group lint ruff format --check .
      - name: mypy
        run: uv run --no-sources --group typing mypy langchain_concentrate

  test:
    name: Unit tests (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Set up Python
        run: uv python install ${{ matrix.python-version }}
      - name: Unit tests (no network)
        run: >
          uv run --no-sources --group test
          pytest --disable-socket --allow-unix-socket tests/unit_tests/
